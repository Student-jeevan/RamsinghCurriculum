<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Personal Learning Dashboard — Track your progress across Mathematics, Programming, CS Fundamentals, Problem Solving, and Board Exam Preparation.">
  <meta name="theme-color" content="#6c5ce7">
  <title>Learning Dashboard</title>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/curriculum.css">
  <link rel="stylesheet" href="css/trackers.css">
  <link rel="stylesheet" href="css/planner.css">
  <link rel="stylesheet" href="css/analytics.css">
  <link rel="stylesheet" href="css/responsive.css">

  <!-- Favicon (inline SVG data URI) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
</head>
<body>
  <div class="app-layout">

    <!-- ─── Sidebar Navigation ──────────────────────────────────── -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-brand-icon">R</div>
        <span class="sidebar-brand-text">LearnHub</span>
      </div>

      <div class="nav-section">
        <div class="nav-section-label">Overview</div>
        <button class="nav-item active" data-route="dashboard">
          <span class="nav-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          </span>
          <span class="nav-label">Dashboard</span>
        </button>
        <button class="nav-item" data-route="curriculum">
          <span class="nav-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
          </span>
          <span class="nav-label">Curriculum</span>
        </button>
        <button class="nav-item" data-route="planner">
          <span class="nav-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          </span>
          <span class="nav-label">Daily Planner</span>
        </button>
      </div>

      <div class="nav-section">
        <div class="nav-section-label">Tracks</div>
        <button class="nav-item" data-route="math">
          <span class="nav-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </span>
          <span class="nav-label">Mathematics</span>
        </button>
        <button class="nav-item" data-route="programming">
          <span class="nav-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
          </span>
          <span class="nav-label">Programming</span>
        </button>
        <button class="nav-item" data-route="problem-solving">
          <span class="nav-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          </span>
          <span class="nav-label">Problem Solving</span>
        </button>
        <button class="nav-item" data-route="board">
          <span class="nav-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 12 3 12 0v-5"/></svg>
          </span>
          <span class="nav-label">Board Prep</span>
        </button>
      </div>

      <div class="nav-section">
        <div class="nav-section-label">Tools</div>
        <button class="nav-item" data-route="knowledge-base">
          <span class="nav-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          </span>
          <span class="nav-label">Knowledge Base</span>
        </button>
        <button class="nav-item" data-route="analytics">
          <span class="nav-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          </span>
          <span class="nav-label">Analytics</span>
        </button>
      </div>

      <!-- Sidebar footer with keyboard hints -->
      <div style="margin-top: auto; padding: var(--sp-4) var(--sp-3); border-top: 1px solid var(--border);">
        <div style="font-size: var(--fs-xs); color: var(--text-muted); display: flex; flex-direction: column; gap: var(--sp-1);">
          <span><kbd style="background: var(--bg-secondary); padding: 1px 5px; border-radius: 3px; font-size: 10px; border: 1px solid var(--border);">Ctrl</kbd>+<kbd style="background: var(--bg-secondary); padding: 1px 5px; border-radius: 3px; font-size: 10px; border: 1px solid var(--border);">K</kbd> Search</span>
          <span><kbd style="background: var(--bg-secondary); padding: 1px 5px; border-radius: 3px; font-size: 10px; border: 1px solid var(--border);">1</kbd>–<kbd style="background: var(--bg-secondary); padding: 1px 5px; border-radius: 3px; font-size: 10px; border: 1px solid var(--border);">9</kbd> Navigate</span>
          <span><kbd style="background: var(--bg-secondary); padding: 1px 5px; border-radius: 3px; font-size: 10px; border: 1px solid var(--border);">Ctrl</kbd>+<kbd style="background: var(--bg-secondary); padding: 1px 5px; border-radius: 3px; font-size: 10px; border: 1px solid var(--border);">D</kbd> Theme</span>
        </div>
      </div>
    </nav>

    <!-- ─── Mobile Nav Overlay ──────────────────────────────────── -->
    <div class="mobile-nav-overlay" id="mobile-nav-overlay"></div>

    <!-- ─── Header ──────────────────────────────────────────────── -->
    <header class="header" id="header">
      <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Toggle menu">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>

      <h1 id="header-title" style="font-size: var(--fs-lg); font-weight: var(--fw-semibold); flex: 1;">Dashboard</h1>

      <div class="flex" style="gap: var(--sp-2);">
        <!-- Search -->
        <button class="btn-icon icon-btn" id="search-btn" title="Search (Ctrl+K)" aria-label="Search">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>

        <!-- Export -->
        <button class="btn-icon icon-btn" id="export-btn" title="Export data" aria-label="Export data">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>

        <!-- Import -->
        <button class="btn-icon icon-btn" id="import-btn" title="Import data" aria-label="Import data">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        </button>

        <!-- Theme Toggle -->
        <button class="btn-icon icon-btn" id="theme-toggle" title="Toggle theme (Ctrl+D)" aria-label="Toggle theme">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        </button>
      </div>
    </header>

    <!-- ─── Main Content ────────────────────────────────────────── -->
    <main class="main-content" id="main-content">
      <!-- Pages rendered here by app.js -->
      <div class="empty-state" style="margin-top: var(--sp-16);">
        <div class="empty-icon">⏳</div>
        <div class="empty-text">Loading dashboard...</div>
      </div>
    </main>

  </div>

  <!-- App Entry Point -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
